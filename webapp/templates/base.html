<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Socials Auto-Publisher{% endblock %}</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; max-width: 760px; margin: 40px auto; padding: 0 20px; line-height: 1.6; color: #1a1a1a; }
    h1 { font-size: 1.8em; }
    h2 { font-size: 1.3em; margin-top: 1.5em; }
    a { color: #2563eb; }
    footer { margin-top: 60px; font-size: 0.85em; color: #888; }
  </style>
</head>
<body>
  {% block content %}{% endblock %}
  <footer>
    <p><a href="/">Home</a> · <a href="/terms">Terms of Service</a> · <a href="/privacy">Privacy Policy</a></p>
  </footer>
</body>
</html>
